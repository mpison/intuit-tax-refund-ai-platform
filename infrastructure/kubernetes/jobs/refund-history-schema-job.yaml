apiVersion: v1
kind: ConfigMap
metadata:
  name: refund-history-schema-v053
  namespace: refund-platform
data:
  V6__refund_status_history.sql: |
    CREATE EXTENSION IF NOT EXISTS pgcrypto;

    CREATE TABLE IF NOT EXISTS refund_status_history (
        refund_status_history_id UUID PRIMARY KEY,
        tax_return_id UUID NOT NULL
            REFERENCES tax_returns(tax_return_id)
            ON DELETE CASCADE,
        previous_status VARCHAR(40),
        new_status VARCHAR(40) NOT NULL,
        source VARCHAR(100) NOT NULL,
        changed_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    CREATE INDEX IF NOT EXISTS idx_refund_history_return_changed
        ON refund_status_history (
            tax_return_id,
            changed_at DESC
        );

    CREATE OR REPLACE FUNCTION record_refund_status_history()
    RETURNS TRIGGER
    LANGUAGE plpgsql
    AS $function$
    BEGIN
        IF TG_OP = 'INSERT' THEN
            INSERT INTO refund_status_history (
                refund_status_history_id,
                tax_return_id,
                previous_status,
                new_status,
                source,
                changed_at
            )
            VALUES (
                gen_random_uuid(),
                NEW.tax_return_id,
                NULL,
                NEW.current_status,
                COALESCE(
                    NEW.external_source,
                    'REFUND_STATUS_SERVICE'
                ),
                COALESCE(
                    NEW.last_checked_at,
                    NOW()
                )
            );

            RETURN NEW;
        END IF;

        IF NEW.current_status IS DISTINCT FROM OLD.current_status THEN
            INSERT INTO refund_status_history (
                refund_status_history_id,
                tax_return_id,
                previous_status,
                new_status,
                source,
                changed_at
            )
            VALUES (
                gen_random_uuid(),
                NEW.tax_return_id,
                OLD.current_status,
                NEW.current_status,
                COALESCE(
                    NEW.external_source,
                    'REFUND_STATUS_SERVICE'
                ),
                COALESCE(
                    NEW.last_checked_at,
                    NOW()
                )
            );
        END IF;

        RETURN NEW;
    END;
    $function$;

    DROP TRIGGER IF EXISTS trg_refund_status_history
        ON refund_statuses;

    CREATE TRIGGER trg_refund_status_history
    AFTER INSERT OR UPDATE OF current_status
    ON refund_statuses
    FOR EACH ROW
    EXECUTE FUNCTION record_refund_status_history();

    INSERT INTO refund_status_history (
        refund_status_history_id,
        tax_return_id,
        previous_status,
        new_status,
        source,
        changed_at
    )
    SELECT
        gen_random_uuid(),
        rs.tax_return_id,
        NULL,
        rs.current_status,
        COALESCE(
            rs.external_source,
            'HISTORY_BACKFILL'
        ),
        COALESCE(
            rs.last_checked_at,
            NOW()
        )
    FROM refund_statuses rs
    WHERE NOT EXISTS (
        SELECT 1
        FROM refund_status_history history
        WHERE history.tax_return_id = rs.tax_return_id
    );

---
apiVersion: batch/v1
kind: Job
metadata:
  name: refund-history-schema-v053
  namespace: refund-platform
spec:
  backoffLimit: 3

  template:
    metadata:
      labels:
        app: refund-history-schema-v053

    spec:
      restartPolicy: Never

      containers:
        - name: postgres-migration
          image: postgres:17-alpine

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          command:
            - sh
            - -c
            - |
              set -eu

              until pg_isready \
                -h postgres \
                -p 5432 \
                -U "$POSTGRES_USER" \
                -d "$POSTGRES_DB"; do

                echo "Waiting for PostgreSQL..."
                sleep 3
              done

              echo "Applying refund history schema..."

              PGPASSWORD="$POSTGRES_PASSWORD" psql \
                -v ON_ERROR_STOP=1 \
                -h postgres \
                -p 5432 \
                -U "$POSTGRES_USER" \
                -d "$POSTGRES_DB" \
                -f /migration/V6__refund_status_history.sql

              echo "Refund history schema completed."

          volumeMounts:
            - name: migration
              mountPath: /migration
              readOnly: true

      volumes:
        - name: migration
          configMap:
            name: refund-history-schema-v053