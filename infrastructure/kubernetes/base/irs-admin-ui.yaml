apiVersion: apps/v1
kind: Deployment
metadata:
  name: irs-admin-ui
  namespace: refund-platform
spec:
  replicas: 1

  selector:
    matchLabels:
      app: irs-admin-ui

  template:
    metadata:
      labels:
        app: irs-admin-ui

    spec:
      containers:
        - name: irs-admin-ui
          image: irs-admin-ui:0.5.4
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: irs-admin-ui
  namespace: refund-platform
spec:
  selector:
    app: irs-admin-ui

  ports:
    - name: http
      port: 80
      targetPort: http
