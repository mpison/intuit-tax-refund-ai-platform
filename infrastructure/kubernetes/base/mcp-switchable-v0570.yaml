apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-mcp-java
  namespace: refund-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customer-mcp
      runtime: java
  template:
    metadata:
      labels:
        app: customer-mcp
        runtime: java
    spec:
      containers:
        - name: customer-mcp
          image: customer-mcp-java:0.5.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8030
          env:
            - name: DATABASE_URL
              value: jdbc:postgresql://postgres:5432/refund_platform
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
---
