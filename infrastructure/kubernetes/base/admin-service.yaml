apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: refund-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: admin-service

  template:
    metadata:
      labels:
        app: admin-service

    spec:
      containers:
        - name: admin-service
          image: admin-service:0.5.5
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8050
              protocol: TCP

          env:
            - name: DATABASE_URL
              value: jdbc:postgresql://postgres:5432/refund_platform

            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: JWT_ISSUER_URI
              value: http://localhost:8081/realms/refund-platform

            - name: JWT_JWK_SET_URI
              value: http://keycloak:8080/realms/refund-platform/protocol/openid-connect/certs

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: refund-platform

spec:
  selector:
    app: admin-service

  ports:
    - name: http
      port: 8050
      targetPort: http
      protocol: TCP