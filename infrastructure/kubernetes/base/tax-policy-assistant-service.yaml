apiVersion: apps/v1
kind: Deployment

metadata:
  name: tax-policy-assistant-service
  namespace: refund-platform

spec:
  replicas: 1

  selector:
    matchLabels:
      app: tax-policy-assistant-service

  template:
    metadata:
      labels:
        app: tax-policy-assistant-service

    spec:
      containers:
        - name: tax-policy-assistant-service

          image: tax-policy-assistant-service:0.5.6

          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8060

          env:
            - name: DATABASE_URL
              value: jdbc:postgresql://postgres:5432/refund_platform

            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

            - name: OLLAMA_BASE_URL
              value: http://host.docker.internal:11434

            - name: OLLAMA_CHAT_MODEL
              value: llama3.2

            - name: OLLAMA_EMBEDDING_MODEL
              value: nomic-embed-text

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http

            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http

            initialDelaySeconds: 60
            periodSeconds: 15

---
apiVersion: v1
kind: Service

metadata:
  name: tax-policy-assistant-service
  namespace: refund-platform

spec:
  selector:
    app: tax-policy-assistant-service

  ports:
    - name: http
      port: 8060
      targetPort: http
