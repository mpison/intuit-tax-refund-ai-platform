apiVersion: apps/v1
kind: Deployment
metadata:
  name: irs-simulator
  namespace: refund-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: irs-simulator
  template:
    metadata:
      labels:
        app: irs-simulator
    spec:
      containers:
        - name: irs-simulator
          image: irs-simulator:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: irs-simulator
  namespace: refund-platform
spec:
  selector:
    app: irs-simulator
  ports:
    - name: http
      port: 8090
      targetPort: http
