apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-ui
  namespace: refund-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-ui
  template:
    metadata:
      labels:
        app: admin-ui
    spec:
      containers:
        - name: admin-ui
          image: admin-ui:0.5.5
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: admin-ui
  namespace: refund-platform
spec:
  selector:
    app: admin-ui
  ports:
    - name: http
      port: 80
      targetPort: http
