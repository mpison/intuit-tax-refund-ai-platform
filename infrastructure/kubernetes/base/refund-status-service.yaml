apiVersion: apps/v1
kind: Deployment
metadata:
  name: refund-status-service
  namespace: refund-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: refund-status-service
  template:
    metadata:
      labels:
        app: refund-status-service
    spec:
      initContainers:
        - name: database-bootstrap
          image: postgres:17-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready                 -h postgres                 -p 5432                 -U "$POSTGRES_USER"                 -d "$POSTGRES_DB"; do

                echo "Waiting for PostgreSQL..."
                sleep 3
              done

              echo "Applying refund database schema..."

              PGPASSWORD="$POSTGRES_PASSWORD"               psql                 -v ON_ERROR_STOP=1                 -h postgres                 -p 5432                 -U "$POSTGRES_USER"                 -d "$POSTGRES_DB"                 -f /bootstrap/V1__initial_schema.sql
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: database-bootstrap
              mountPath: /bootstrap
              readOnly: true
      containers:
        - name: refund-status-service
          image: refund-status-service:0.2.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: kubernetes
            - name: DATABASE_URL
              value: jdbc:postgresql://postgres:5432/refund_platform
            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: JWT_ISSUER_URI
              value: http://localhost:8081/realms/refund-platform
            - name: JWT_JWK_SET_URI
              value: http://keycloak:8080/realms/refund-platform/protocol/openid-connect/certs
            - name: IRS_SIMULATOR_BASE_URL
              value: http://irs-simulator:8090
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 35
            periodSeconds: 10
      volumes:
        - name: database-bootstrap
          configMap:
            name: refund-database-bootstrap
---
apiVersion: v1
kind: Service
metadata:
  name: refund-status-service
  namespace: refund-platform
spec:
  selector:
    app: refund-status-service
  ports:
    - name: http
      port: 8080
      targetPort: http
