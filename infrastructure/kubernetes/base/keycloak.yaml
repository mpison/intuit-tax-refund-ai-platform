apiVersion: v1
kind: ConfigMap
metadata: {name: keycloak-realm, namespace: refund-platform}
data:
  refund-platform-realm.json: |
    {
      "realm": "refund-platform",
      "enabled": true,
      "displayName": "Refund Platform",
      "sslRequired": "none",
      "registrationAllowed": false,
      "roles": {
        "realm": [
          {
            "name": "CUSTOMER"
          },
          {
            "name": "ADMIN"
          }
        ]
      },
      "clients": [
        {
          "clientId": "customer-ui",
          "enabled": true,
          "publicClient": true,
          "protocol": "openid-connect",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "redirectUris": [
            "http://localhost:3000/*"
          ],
          "webOrigins": [
            "http://localhost:3000"
          ],
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": "http://localhost:3000/*"
          }
        }
      ],
      "users": [
        {
          "id": "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa",
          "username": "mel.demo",
          "enabled": true,
          "emailVerified": true,
          "firstName": "Mel",
          "lastName": "Demo",
          "email": "mel.demo@example.com",
          "credentials": [
            {
              "type": "password",
              "value": "Demo123!",
              "temporary": false
            }
          ],
          "realmRoles": [
            "CUSTOMER"
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: keycloak, namespace: refund-platform}
spec:
  replicas: 1
  selector: {matchLabels: {app: keycloak}}
  template:
    metadata: {labels: {app: keycloak}}
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.6.0
          args: [start-dev,--import-realm]
          env:
            - {name: KC_BOOTSTRAP_ADMIN_USERNAME, value: admin}
            - {name: KC_BOOTSTRAP_ADMIN_PASSWORD, value: admin}
            - {name: KC_HOSTNAME_STRICT, value: "false"}
          ports: [{containerPort: 8080}]
          readinessProbe: {httpGet: {path: /realms/master, port: 8080}, initialDelaySeconds: 30, periodSeconds: 10}
          volumeMounts: [{name: realm, mountPath: /opt/keycloak/data/import}]
      volumes: [{name: realm, configMap: {name: keycloak-realm}}]
---
apiVersion: v1
kind: Service
metadata: {name: keycloak, namespace: refund-platform}
spec: {selector: {app: keycloak}, ports: [{port: 8080, targetPort: 8080}]}
