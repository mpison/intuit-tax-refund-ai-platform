apiVersion: v1
kind: Secret
metadata: {name: postgres-secret, namespace: refund-platform}
type: Opaque
stringData: {POSTGRES_DB: refund_platform, POSTGRES_USER: refund_user, POSTGRES_PASSWORD: refund_password}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: postgres-data, namespace: refund-platform}
spec: {accessModes: [ReadWriteOnce], resources: {requests: {storage: 2Gi}}}
---
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: postgres, namespace: refund-platform}
spec:
  serviceName: postgres
  replicas: 1
  selector: {matchLabels: {app: postgres}}
  template:
    metadata: {labels: {app: postgres}}
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports: [{containerPort: 5432}]
          envFrom: [{secretRef: {name: postgres-secret}}]
          readinessProbe: {exec: {command: [sh,-c,"pg_isready -U refund_user -d refund_platform"]}, initialDelaySeconds: 8, periodSeconds: 5}
          volumeMounts: [{name: data, mountPath: /var/lib/postgresql/data}]
      volumes: [{name: data, persistentVolumeClaim: {claimName: postgres-data}}]
---
apiVersion: v1
kind: Service
metadata: {name: postgres, namespace: refund-platform}
spec: {selector: {app: postgres}, ports: [{port: 5432, targetPort: 5432}]}
