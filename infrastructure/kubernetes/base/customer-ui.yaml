apiVersion: apps/v1
kind: Deployment
metadata: {name: customer-ui, namespace: refund-platform}
spec:
  replicas: 1
  selector: {matchLabels: {app: customer-ui}}
  template:
    metadata: {labels: {app: customer-ui}}
    spec:
      containers:
        - name: customer-ui
          image: customer-ui:0.1.1
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 80}]
          readinessProbe: {httpGet: {path: /, port: 80}, initialDelaySeconds: 5, periodSeconds: 5}
---
apiVersion: v1
kind: Service
metadata: {name: customer-ui, namespace: refund-platform}
spec: {selector: {app: customer-ui}, ports: [{port: 80, targetPort: 80}]}
