apiVersion: apps/v1
kind: Deployment
metadata:
  name: irs-simulator
  namespace: refund-platform
spec:
  replicas: 1

  selector:
    matchLabels:
      app: irs-simulator

  template:
    metadata:
      labels:
        app: irs-simulator

    spec:
      containers:
        - name: irs-simulator
          image: irs-simulator:0.5.4
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8090

          env:
            - name: DATABASE_URL
              value: jdbc:postgresql://postgres:5432/refund_platform

            - name: DATABASE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: irs-simulator
  namespace: refund-platform
spec:
  selector:
    app: irs-simulator

  ports:
    - name: http
      port: 8090
      targetPort: http
