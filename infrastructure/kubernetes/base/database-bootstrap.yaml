apiVersion: v1
kind: ConfigMap
metadata:
  name: refund-database-bootstrap
  namespace: refund-platform
data:
  V1__initial_schema.sql: |
    CREATE TABLE IF NOT EXISTS app_users (
        user_id UUID PRIMARY KEY,
        external_identity_id VARCHAR(100) NOT NULL UNIQUE,
        display_name VARCHAR(150) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS tax_returns (
        tax_return_id UUID PRIMARY KEY,
        user_id UUID NOT NULL REFERENCES app_users(user_id),
        tax_year INTEGER NOT NULL,
        filed_at TIMESTAMPTZ NOT NULL,
        refund_amount NUMERIC(12, 2) NOT NULL
    );

    CREATE INDEX IF NOT EXISTS idx_tax_returns_user_filed
        ON tax_returns(user_id, filed_at DESC);

    CREATE TABLE IF NOT EXISTS refund_statuses (
        refund_status_id UUID PRIMARY KEY,
        tax_return_id UUID NOT NULL UNIQUE REFERENCES tax_returns(tax_return_id),
        current_status VARCHAR(40) NOT NULL,
        last_checked_at TIMESTAMPTZ NOT NULL
    );

    INSERT INTO app_users (
      user_id,
      external_identity_id,
      display_name,
      created_at,
      first_name,
      last_name,
      phone_number,
      updated_at,
      email
    )
    VALUES (
      '11111111-1111-1111-1111-111111111111',
      'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa',
      'Mel Demo',
      NOW(),
      'Mel',
      'Demo',
      NULL,
      NOW(),
      'mel.demo@example.com'
    )
    ON CONFLICT (user_id) DO UPDATE
    SET
      external_identity_id = EXCLUDED.external_identity_id,
      display_name = EXCLUDED.display_name,
      first_name = EXCLUDED.first_name,
      last_name = EXCLUDED.last_name,
      updated_at = NOW(),
      email = EXCLUDED.email;

    INSERT INTO tax_returns (
        tax_return_id,
        user_id,
        tax_year,
        filed_at,
        refund_amount
    ) VALUES (
        '22222222-2222-2222-2222-222222222222',
        '11111111-1111-1111-1111-111111111111',
        2025,
        '2026-04-10T10:00:00Z',
        2850.00
    )
    ON CONFLICT (tax_return_id) DO UPDATE SET
        user_id = EXCLUDED.user_id,
        tax_year = EXCLUDED.tax_year,
        filed_at = EXCLUDED.filed_at,
        refund_amount = EXCLUDED.refund_amount;

    INSERT INTO refund_statuses (
        refund_status_id,
        tax_return_id,
        current_status,
        last_checked_at
    ) VALUES (
        '33333333-3333-3333-3333-333333333333',
        '22222222-2222-2222-2222-222222222222',
        'PROCESSING',
        NOW()
    )
    ON CONFLICT (refund_status_id) DO UPDATE SET
        tax_return_id = EXCLUDED.tax_return_id,
        current_status = EXCLUDED.current_status,
        last_checked_at = EXCLUDED.last_checked_at;
