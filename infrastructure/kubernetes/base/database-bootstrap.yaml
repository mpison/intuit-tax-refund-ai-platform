apiVersion: v1
kind: ConfigMap
metadata:
  name: refund-database-bootstrap
  namespace: refund-platform
data:
  V1__initial_schema.sql: |
    CREATE TABLE IF NOT EXISTS app_users (
        user_id UUID PRIMARY KEY,
        external_identity_id VARCHAR(100) NOT NULL UNIQUE,
        display_name VARCHAR(150) NOT NULL
    );

    CREATE TABLE IF NOT EXISTS tax_returns (
        tax_return_id UUID PRIMARY KEY,
        user_id UUID NOT NULL REFERENCES app_users(user_id),
        tax_year INTEGER NOT NULL,
        filed_at TIMESTAMPTZ NOT NULL,
        refund_amount NUMERIC(12, 2) NOT NULL
    );

    CREATE INDEX IF NOT EXISTS idx_tax_returns_user_filed
        ON tax_returns(user_id, filed_at DESC);

    CREATE TABLE IF NOT EXISTS refund_statuses (
        refund_status_id UUID PRIMARY KEY,
        tax_return_id UUID NOT NULL UNIQUE
            REFERENCES tax_returns(tax_return_id),
        current_status VARCHAR(40) NOT NULL,
        last_checked_at TIMESTAMPTZ NOT NULL
    );

    ALTER TABLE app_users
        ADD COLUMN IF NOT EXISTS email VARCHAR(255);

    ALTER TABLE app_users
        ADD COLUMN IF NOT EXISTS first_name VARCHAR(100);

    ALTER TABLE app_users
        ADD COLUMN IF NOT EXISTS last_name VARCHAR(100);

    ALTER TABLE app_users
        ADD COLUMN IF NOT EXISTS phone_number VARCHAR(32);

    ALTER TABLE app_users
        ADD COLUMN IF NOT EXISTS created_at TIMESTAMPTZ;

    ALTER TABLE app_users
        ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ;

    ALTER TABLE tax_returns
        ADD COLUMN IF NOT EXISTS external_refund_id VARCHAR(100);

    ALTER TABLE tax_returns
        ADD COLUMN IF NOT EXISTS filing_method VARCHAR(32);

    ALTER TABLE refund_statuses
        ADD COLUMN IF NOT EXISTS external_source VARCHAR(100);

    UPDATE app_users
    SET
        email = COALESCE(
            email,
            'mel.demo@example.com'
        ),
        created_at = COALESCE(
            created_at,
            NOW()
        ),
        updated_at = COALESCE(
            updated_at,
            created_at,
            NOW()
        );

    ALTER TABLE app_users
        ALTER COLUMN email SET NOT NULL;

    ALTER TABLE app_users
        ALTER COLUMN created_at SET NOT NULL;

    UPDATE tax_returns
    SET filing_method = COALESCE(
        filing_method,
        'E_FILE'
    );

    ALTER TABLE tax_returns
        ALTER COLUMN filing_method SET DEFAULT 'E_FILE';

    CREATE UNIQUE INDEX IF NOT EXISTS ux_tax_returns_external_refund_id
        ON tax_returns(external_refund_id)
        WHERE external_refund_id IS NOT NULL;

    INSERT INTO app_users (
        user_id,
        external_identity_id,
        display_name,
        created_at,
        first_name,
        last_name,
        phone_number,
        updated_at,
        email
    )
    VALUES (
        '11111111-1111-1111-1111-111111111111',
        'aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa',
        'Mel Demo',
        NOW(),
        'Mel',
        'Demo',
        NULL,
        NOW(),
        'mel.demo@example.com'
    )
    ON CONFLICT (user_id) DO UPDATE
    SET
        external_identity_id = EXCLUDED.external_identity_id,
        display_name = EXCLUDED.display_name,
        first_name = EXCLUDED.first_name,
        last_name = EXCLUDED.last_name,
        updated_at = NOW(),
        email = EXCLUDED.email;

    INSERT INTO tax_returns (
        tax_return_id,
        user_id,
        tax_year,
        filed_at,
        refund_amount,
        external_refund_id,
        filing_method
    )
    VALUES (
        '22222222-2222-2222-2222-222222222222',
        '11111111-1111-1111-1111-111111111111',
        2025,
        '2026-04-10T10:00:00Z',
        2850.00,
        'IRS-DEMO-2025-0001',
        'E_FILE'
    )
    ON CONFLICT (tax_return_id) DO UPDATE
    SET
        user_id = EXCLUDED.user_id,
        tax_year = EXCLUDED.tax_year,
        filed_at = EXCLUDED.filed_at,
        refund_amount = EXCLUDED.refund_amount,
        external_refund_id = EXCLUDED.external_refund_id,
        filing_method = EXCLUDED.filing_method;

    INSERT INTO refund_statuses (
        refund_status_id,
        tax_return_id,
        current_status,
        last_checked_at,
        external_source
    )
    VALUES (
        '33333333-3333-3333-3333-333333333333',
        '22222222-2222-2222-2222-222222222222',
        'PROCESSING',
        NOW(),
        'IRS_SIMULATOR'
    )
    ON CONFLICT (refund_status_id) DO UPDATE
    SET
        tax_return_id = EXCLUDED.tax_return_id,
        current_status = EXCLUDED.current_status,
        last_checked_at = EXCLUDED.last_checked_at,
        external_source = EXCLUDED.external_source;