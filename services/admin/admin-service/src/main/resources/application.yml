server:
  port: 8050

spring:
  application:
    name: admin-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/refund_platform}
    username: ${DATABASE_USERNAME:refund_user}
    password: ${DATABASE_PASSWORD:refund_password}
    driver-class-name: org.postgresql.Driver

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081/realms/refund-platform}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://keycloak:8080/realms/refund-platform/protocol/openid-connect/certs}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
