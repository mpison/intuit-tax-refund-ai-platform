spring:
  application:
    name: policy-management-service

  datasource:
    url: jdbc:postgresql://localhost:5432/refund_platform
    username: refund_user
    password: refund_password
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  security:
      oauth2:
        resourceserver:
          jwt:
            issuer-uri: http://localhost:8081/realms/refund-platform
            jwk-set-uri: http://keycloak:8080/realms/refund-platform/protocol/openid-connect/certs


server:
  port: 8040

logging:
  level:
    com.refundplatform: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always