server:
  port: 8040

spring:
  application:
    name: policy-management-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/refund_platform}
    username: ${DATABASE_USERNAME:refund_user}
    password: ${DATABASE_PASSWORD:refund_password}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081/realms/refund-platform}
          jwk-set-uri: ${JWT_JWK_SET_URI:http://keycloak:8080/realms/refund-platform/protocol/openid-connect/certs}

policy:
  storage:
    directory: ${POLICY_STORAGE_DIRECTORY:/data/policies}
  ingestion:
    base-url: ${POLICY_INGESTION_BASE_URL:http://tax-policy-assistant-service:8060}
    internal-api-key: ${POLICY_INTERNAL_API_KEY:refund-demo-policy-key-v056}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
