spring.application.name=customer-mcp-server

server.port=8030

spring.datasource.url=jdbc:postgresql://localhost:5432/refund_platform
spring.datasource.username=refund_user
spring.datasource.password=refund_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.name=customer-mcp-server

logging.level.com.refundplatform=DEBUG
logging.level.org.springframework.ai.mcp=DEBUG

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always