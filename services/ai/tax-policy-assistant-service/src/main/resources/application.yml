server:
  port: 8060

spring:
  application:
    name: tax-policy-assistant-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/refund_platform}
    username: ${DATABASE_USERNAME:refund_user}
    password: ${DATABASE_PASSWORD:refund_password}

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}

      chat:
        options:
          model: ${OLLAMA_CHAT_MODEL:llama3.2}
          temperature: 0.2

      embedding:
        options:
          model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}

    vectorstore:
      pgvector:
        initialize-schema: true
        schema-name: public
        table-name: vector_store
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW
    mcp:
      client:
        enabled: true
        name: tax-policy-assistant-mcp-client
        version: 0.5.7.1
        initialized: true
        type: SYNC
        request-timeout: 20s
        toolcallback:
          enabled: true
        streamable-http:
          connections:
            customer:
              url: ${CUSTOMER_MCP_URL:http://customer-mcp:8030}
              endpoint: /mcp
            refund:
              url: ${REFUND_MCP_URL:http://refund-mcp:8031}
              endpoint: /mcp
            prediction:
              url: ${PREDICTION_MCP_URL:http://prediction-mcp:8032}
              endpoint: /mcp
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

  endpoint:
    health:
      probes:
        enabled: true
