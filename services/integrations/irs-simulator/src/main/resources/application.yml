server:
  port: 8090

spring:
  application:
    name: irs-simulator

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/refund_platform}
    username: ${DATABASE_USERNAME:refund_user}
    password: ${DATABASE_PASSWORD:refund_password}
    driver-class-name: org.postgresql.Driver

    hikari:
      minimum-idle: 1
      maximum-pool-size: 5
      connection-timeout: 30000
      pool-name: IrsSimulatorHikariPool

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
